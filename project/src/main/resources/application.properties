spring.application.name=project
# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sohamkadam
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Logging
# ===============================
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO

# ===============================
# Server Configuration
# ===============================
server.port=8080
server.error.include-message=always

# ===============================
# Jackson Configuration
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# JWT Configuration
# JWT Configuration - USE THIS EXACT SECRET KEY
app.jwtSecret=mySecretKeyForJWTTokenGenerationAndValidation2024SecureKeyMustBeLongEnough
app.jwtExpirationMs=86400000




spring.ai.openai.api-key=
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=stepfun/step-3.5-flash
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=4096


# Python OCR Service Configuration
ocr.service.url=http://localhost:8000
ocr.service.timeout=30000


# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB